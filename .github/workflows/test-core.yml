name: Core Functionality Test

on:
  workflow_dispatch:

jobs:
  test-core:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: dotnet publish BarTenderPrinter/BarTenderPrinter.csproj -c Release -r win-x64 --self-contained true -o publish

      - name: Test 1 - Process starts and enters offline mode
        id: test1
        run: |
          Write-Host "=== Test 1: Process Start & Offline Mode ==="
          
          # Clean up any existing config/log
          $configDir = "$env:USERPROFILE\.bartender-printer"
          if (Test-Path $configDir) { Remove-Item $configDir -Recurse -Force }
          
          # Start process
          $process = Start-Process -FilePath "publish/BarTenderPrinter.exe" -PassThru -WindowStyle Hidden
          Write-Host "Process started with PID: $($process.Id)"
          
          # Wait for initialization
          Start-Sleep -Seconds 8
          
          # Check if still running
          if ($process.HasExited) {
            Write-Host "FAIL: Process exited unexpectedly with code $($process.ExitCode)"
            echo "test1=FAIL" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "PASS: Process is still running"
            $process.Kill()
            echo "test1=PASS" >> $env:GITHUB_OUTPUT
          }

      - name: Test 2 - Log file created with offline mode
        id: test2
        run: |
          Write-Host "=== Test 2: Log File & Offline Mode ==="
          
          $logFile = "$env:USERPROFILE\.bartender-printer\bartender-printer.log"
          if (Test-Path $logFile) {
            $content = Get-Content $logFile -Raw
            Write-Host "Log file content:"
            Write-Host $content
            
            if ($content -match "离线模式|offline|BarTender.*未安装|WARNING") {
              Write-Host "PASS: Offline mode detected in log"
              echo "test2=PASS" >> $env:GITHUB_OUTPUT
            } else {
              Write-Host "WARN: Offline mode not explicitly detected, but log exists"
              echo "test2=PASS" >> $env:GITHUB_OUTPUT
            }
          } else {
            Write-Host "FAIL: Log file not found at $logFile"
            # Check alternative locations
            $altPath = "$env:USERPROFILE\.bartender-printer"
            if (Test-Path $altPath) {
              Write-Host "Config dir exists, contents:"
              Get-ChildItem $altPath
            }
            echo "test2=FAIL" >> $env:GITHUB_OUTPUT
          }

      - name: Test 3 - Config file created
        id: test3
        run: |
          Write-Host "=== Test 3: Config File ==="
          
          $configFile = "$env:USERPROFILE\.bartender-printer\config.ini"
          if (Test-Path $configFile) {
            $content = Get-Content $configFile -Raw
            Write-Host "Config file content:"
            Write-Host $content
            Write-Host "PASS: Config file created"
            echo "test3=PASS" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "WARN: Config file not created yet (may need user interaction)"
            echo "test3=WARN" >> $env:GITHUB_OUTPUT
          }

      - name: Test 4 - History file check
        id: test4
        run: |
          Write-Host "=== Test 4: History File ==="
          
          $historyFile = "$env:USERPROFILE\.bartender-printer\print_records.csv"
          if (Test-Path $historyFile) {
            $content = Get-Content $historyFile -Raw
            Write-Host "History file content:"
            Write-Host $content
            Write-Host "PASS: History file exists"
            echo "test4=PASS" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "INFO: History file not created (no prints yet, expected)"
            echo "test4=PASS" >> $env:GITHUB_OUTPUT
          }

      - name: Test 5 - Save config via INI API
        id: test5
        run: |
          Write-Host "=== Test 5: INI Config API ==="
          
          # Test INI write/read using kernel32 directly
          Add-Type @"
          using System;
          using System.Runtime.InteropServices;
          using System.Text;
          public class IniHelper {
              [DllImport("kernel32", CharSet = CharSet.Unicode)]
              public static extern long WritePrivateProfileString(string section, string key, string val, string filePath);
              [DllImport("kernel32", CharSet = CharSet.Unicode)]
              public static extern int GetPrivateProfileString(string section, string key, string def, StringBuilder retVal, int size, string filePath);
          }
          "@
          
          $testFile = "$env:TEMP\test_config.ini"
          
          # Write test values
          [IniHelper]::WritePrivateProfileString("General", "Printer", "Test Printer", $testFile)
          [IniHelper]::WritePrivateProfileString("General", "Copies", "3", $testFile)
          [IniHelper]::WritePrivateProfileString("General", "TemplatesFolder", @"templates, $testFile)
          
          # Read back
          $sb = New-Object System.Text.StringBuilder 2048
          [IniHelper]::GetPrivateProfileString("General", "Printer", "", $sb, 2048, $testFile)
          $printer = $sb.ToString()
          
          [IniHelper]::GetPrivateProfileString("General", "Copies", "", $sb, 2048, $testFile)
          $copies = $sb.ToString()
          
          Write-Host "Read back: Printer=$printer, Copies=$copies"
          
          if ($printer -eq "Test Printer" -and $copies -eq "3") {
            Write-Host "PASS: INI config read/write works"
            echo "test5=PASS" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "FAIL: INI config mismatch"
            echo "test5=FAIL" >> $env:GITHUB_OUTPUT
          }
          
          # Cleanup
          Remove-Item $testFile -Force -ErrorAction SilentlyContinue

      - name: Test 6 - History CSV read/write
        id: test6
        run: |
          Write-Host "=== Test 6: CSV History ==="
          
          $testCsv = "$env:TEMP\test_history.csv"
          
          # Write test CSV
          @"
          imei,print_time,status
          359037960065737,2026-06-15 10:00:00,PASS
          359037960065738,2026-06-15 10:01:00,FAIL
          359037960065739,2026-06-15 10:02:00,PASS
          "@ | Out-File -FilePath $testCsv -Encoding UTF8
          
          # Read back and parse
          $lines = Get-Content $testCsv | Where-Object { $_.Trim() -ne "" }
          $header = $lines[0]
          $records = $lines[1..($lines.Length-1)]
          
          Write-Host "Header: $header"
          Write-Host "Records: $($records.Count)"
          
          foreach ($record in $records) {
            $parts = $record -split ","
            Write-Host "  IMEI: $($parts[0]), Status: $($parts[2])"
          }
          
          if ($records.Count -eq 3 -and $header -eq "imei,print_time,status") {
            Write-Host "PASS: CSV history read/write works"
            echo "test6=PASS" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "FAIL: CSV parsing issue"
            echo "test6=FAIL" >> $env:GITHUB_OUTPUT
          }
          
          Remove-Item $testCsv -Force -ErrorAction SilentlyContinue

      - name: Test 7 - BarTender COM check
        id: test7
        run: |
          Write-Host "=== Test 7: BarTender COM Availability ==="
          
          try {
            $type = [Type]::GetTypeFromProgID("BarTender.Application")
            if ($type -ne $null) {
              Write-Host "BarTender COM is available"
              echo "test7=COM_AVAILABLE" >> $env:GITHUB_OUTPUT
            } else {
              Write-Host "BarTender COM not registered (expected on GitHub Actions)"
              echo "test7=NOT_AVAILABLE" >> $env:GITHUB_OUTPUT
            }
          } catch {
            Write-Host "BarTender COM check failed: $_"
            echo "test7=NOT_AVAILABLE" >> $env:GITHUB_OUTPUT
          }

      - name: Test 8 - Template file operations
        id: test8
        run: |
          Write-Host "=== Test 8: Template File Operations ==="
          
          # Create test template directory
          $templateDir = "$env:TEMP\test_templates"
          New-Item -ItemType Directory -Path $templateDir -Force | Out-Null
          
          # Create dummy .btw files
          "test1" | Out-File "$templateDir\test1.btw"
          "test2" | Out-File "$templateDir\test2.btw"
          "test3" | Out-File "$templateDir\test3.btw"
          
          # List templates
          $templates = Get-ChildItem "$templateDir\*.btw"
          Write-Host "Found $($templates.Count) templates:"
          foreach ($t in $templates) {
            Write-Host "  - $($t.Name)"
          }
          
          if ($templates.Count -eq 3) {
            Write-Host "PASS: Template file operations work"
            echo "test8=PASS" >> $env:GITHUB_OUTPUT
          } else {
            Write-Host "FAIL: Template count mismatch"
            echo "test8=FAIL" >> $env:GITHUB_OUTPUT
          }
          
          Remove-Item $templateDir -Recurse -Force -ErrorAction SilentlyContinue

      - name: Generate test summary
        if: always()
        run: |
          $summary = @"
          # BarTender Printer Core Functionality Test Results
          
          ## Environment
          - OS: $([System.Environment]::OSVersion.VersionString)
          - .NET: $([System.Runtime.InteropServices.RuntimeInformation]::FrameworkDescription)
          - Architecture: $([System.Runtime.InteropServices.RuntimeInformation]::OSArchitecture)
          - Date: $(Get-Date -Format "yyyy-MM-dd HH:mm:ss")
          
          ## Test Results
          | Test | Result |
          |------|--------|
          | Process Start | ${{ steps.test1.outputs.test1 }} |
          | Log & Offline Mode | ${{ steps.test2.outputs.test2 }} |
          | Config File | ${{ steps.test3.outputs.test3 }} |
          | History File | ${{ steps.test4.outputs.test4 }} |
          | INI Config API | ${{ steps.test5.outputs.test5 }} |
          | CSV History | ${{ steps.test6.outputs.test6 }} |
          | BarTender COM | ${{ steps.test7.outputs.test7 }} |
          | Template Files | ${{ steps.test8.outputs.test8 }} |
          
          ## Notes
          - BarTender is not installed on GitHub Actions runners
          - The app should enter offline mode when BarTender is not available
          - All non-printing features should work in offline mode
          "@
          
          Write-Host $summary
          $summary | Out-File -FilePath "test-summary.md"

      - name: Upload test summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: core-test-results
          path: test-summary.md
