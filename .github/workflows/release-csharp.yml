name: Release C# BarTender Printer

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish self-contained single file
        run: dotnet publish BarTenderPrinter/BarTenderPrinter.csproj -c Release -r win-x64 --self-contained true -o publish

      - name: Get version from tag
        id: version
        run: echo "VERSION=${{ github.ref_name }}" >> $env:GITHUB_OUTPUT

      - name: Rename exe with version
        run: Rename-Item -Path "publish/BarTenderPrinter.exe" -NewName "BarTenderPrinter-${{ steps.version.outputs.VERSION }}-win-x64.exe"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: "publish/BarTenderPrinter-${{ steps.version.outputs.VERSION }}-win-x64.exe"
          body: |
            ## BarTender 标签打印工具 ${{ steps.version.outputs.VERSION }}

            ### 更新内容

            #### 优化
            - 优化窗口默认尺寸 (1080x900 → 880x800)，减少右侧空白区域
            - 修复模板下拉框未随窗口拉伸的问题 (cmbTemplate 增加 Anchor Right)
            - Enter键跳过增序锁定字段 (ReadOnly) 自动触发打印
            - 界面布局自动适应窗口大小变化

            #### 新增
            - 数据源选择对话框拖拽排序，排序顺序保存到配置
            - 主界面数据源输入框支持拖拽排序 (≡ 手柄)
            - 增序锁定字段获得焦点时自动跳到下一个可输入字段
            - 本地数据校验：支持 CSV/Excel/文本 加载校验数据

            #### 修复
            - 修复并发打印冲突：SemaphoreSlim 互斥锁、操作间隔 2s、重试机制
            - 识别 COM 忙碌错误 (RPC_E_SERVERFAULT) 并自动重试
            - 修复版本号不一致 (Designer.cs 硬编码问题)

            ### 系统要求
            - Windows 10/11 x64
            - .NET 8.0 运行时（已内置，无需额外安装）
            - BarTender 2022 R2 Enterprise 或更高版本

            ### 安装说明
            1. 下载 `BarTenderPrinter-${{ steps.version.outputs.VERSION }}-win-x64.exe`
            2. 直接运行即可，无需安装
            3. 首次运行需要配置 BarTender 模板和打印机

            ### 文件信息
            - 文件名: BarTenderPrinter-${{ steps.version.outputs.VERSION }}-win-x64.exe
            - 架构: win-x64
            - 类型: 自包含单文件
          generate_release_notes: false
          draft: false
          prerelease: false
