name: Build C# BarTender Printer

on:
  push:
    branches: [ main ]
    paths:
      - 'BarTenderPrinter/**'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish self-contained single file
        run: dotnet publish BarTenderPrinter/BarTenderPrinter.csproj -c Release -r win-x64 --self-contained true -o publish

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: bartender-printer-csharp
          path: publish/BarTenderPrinter.exe
          if-no-files-found: error
