name: Build C# BarTender Printer

on:
  push:
    branches: [ main ]
    paths:
      - 'BarTenderPrinter/**'
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      - name: Restore NuGet packages
        run: nuget restore BarTenderPrinter/BarTenderPrinter.csproj

      - name: Build
        run: msbuild BarTenderPrinter/BarTenderPrinter.csproj /p:Configuration=Release

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: bartender-printer-csharp
          path: BarTenderPrinter/bin/Release/BarTenderPrinter.exe
          if-no-files-found: error
